<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uoni | تحدي الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .progress-container { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; margin-bottom: 3rem; overflow: hidden; border: 1px solid rgba(125, 211, 252, 0.1); }
        .progress-bar { height: 100%; background: linear-gradient(to left, var(--secondary), var(--accent)); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--baby-blue-glow); }
        
        .quiz-option { cursor: pointer; border: 1px solid rgba(125, 211, 252, 0.1); border-radius: 18px; padding: 1.2rem; margin-bottom: 1.2rem; transition: var(--transition); display: flex; align-items: center; gap: 1.2rem; background: rgba(255, 255, 255, 0.02); color: var(--text-main); }
        .quiz-option:hover { border-color: var(--secondary); background: rgba(125, 211, 252, 0.08); transform: translateX(-5px); }
        .quiz-option.correct { border-color: #10b981; background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .quiz-option.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #f87171; }
        
        .option-index { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background: rgba(125, 211, 252, 0.1); border-radius: 50%; font-weight: 800; color: var(--secondary); font-size: 0.9rem; }
        .quiz-option.correct .option-index { background: #10b981; color: white; }
        .quiz-option.wrong .option-index { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <nav class="navbar animate-fade">
        <div class="logo">Uoni</div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="lessons.html">مسارات AI</a></li>
            <li><a href="quiz.html">تحديات ذكية</a></li>
        </ul>
        <a href="../index.html" class="btn btn-secondary" style="padding: 0.6rem 1.5rem;">إنهاء التحدي</a>
    </nav>

    <header class="hero" style="padding: 6rem 5% 3rem;">
        <div class="container">
            <h1 class="animate-fade">تحدي <span style="color: var(--secondary); text-shadow: var(--baby-blue-glow);">المستقبل</span></h1>
            <p class="animate-fade" style="animation-delay: 0.2s;">اختبر مهاراتك في مفاهيم الذكاء الاصطناعي وتقنيات العصر الرقمي الحديث.</p>
        </div>
    </header>

    <main class="container">
        <div class="quiz-box animate-fade" style="animation-delay: 0.4s; margin-bottom: 6rem; margin-top: 3rem;">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            
            <div id="quiz-content">
                <h2 id="question-text" style="margin-bottom: 2.5rem; font-size: 1.8rem; color: var(--white); line-height: 1.4;">جاري تحميل الأسئلة...</h2>
                <div id="options-container">
                    <!-- Options injected here -->
                </div>
            </div>

            <div id="quiz-footer" style="margin-top: 4rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 2rem;">
                <span id="question-counter" style="color: var(--text-muted); font-weight: 600; font-size: 1.1rem;">السؤال 1 من 5</span>
                <button id="next-btn" class="btn" style="display: none; padding: 0.8rem 2.5rem;">السؤال التالي ➔</button>
            </div>

            <div id="result-screen" style="display: none; text-align: center; padding: 2rem 0;">
                <div id="result-icon" style="font-size: 6rem; margin-bottom: 2rem; filter: drop-shadow(0 0 15px var(--secondary));">🏆</div>
                <h2 id="result-title" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--white);">نتيجة مذهلة!</h2>
                <p id="result-score" style="font-size: 1.8rem; color: var(--secondary); margin-bottom: 3rem; font-weight: 800;">لقد حصلت على 5/5</p>
                <div style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
                    <button onclick="location.reload()" class="btn">إعادة التحدي</button>
                    <a href="lessons.html" class="btn btn-secondary">استكشاف مسارات أخرى</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center; padding: 4rem 0;">
            <div class="footer-logo" style="margin-bottom: 1rem;">Uoni</div>
            <p style="color: var(--text-muted);">&copy; 2026 Uoni AI Platform - جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script>
        const questions = [
            { q: "ما هو الهدف الأساسي من الذكاء الاصطناعي (AI)؟", options: ["صناعة حواسيب أسرع فقط", "محاكاة عمليات الذكاء البشري بواسطة الآلات", "استبدال جميع البشر في الوظائف", "تخزين البيانات بشكل أكبر"], correct: 1 },
            { q: "أي من هذه الأمثلة يعتبر ذكاءً اصطناعياً توليدياً (Generative AI)؟", options: ["محرك البحث التقليدي", "نظام تشغيل الويندوز", "نموذج ChatGPT لتوليد النصوص", "لوحة مفاتيح الحاسوب"], correct: 2 },
            { q: "ما هو 'تعلم الآلة' (Machine Learning)؟", options: ["تدريس الآلات في المدارس", "برمجة كل خطوة للآلة يدوياً", "قدرة الأنظمة على التعلم من البيانات وتحسين أدائها", "صيانة الأجزاء المادية للحاسوب"], correct: 2 },
            { q: "ما هي مهارة 'هندسة الأوامر' (Prompt Engineering)؟", options: ["تصليح المحركات الميكانيكية", "فن صياغة المدخلات للحصول على أفضل نتائج من AI", "بناء خوادم الإنترنت", "كتابة كود بلغة جافا"], correct: 1 },
            { q: "لماذا تعتبر 'الأخلاقيات' مهمة في تطوير الذكاء الاصطناعي؟", options: ["لأنها تجعل البرنامج أسرع", "لضمان العدالة وتجنب التحيز وحماية الخصوصية", "لأن القانون يفرض ذلك فقط", "لتقليل تكلفة التطوير"], correct: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `السؤال ${currentIdx + 1} من ${questions.length}`;
            document.getElementById('progress').style.width = `${((currentIdx) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerHTML = `<div class="option-index">${String.fromCharCode(65 + idx)}</div> <strong>${opt}</strong>`;
                div.onclick = () => selectOption(idx, div);
                container.appendChild(div);
            });
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectOption(idx, element) {
            if (answered) return;
            answered = true;
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.quiz-option');
            
            if (idx === q.correct) {
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('wrong');
                options[q.correct].classList.add('correct');
            }
            
            document.getElementById('next-btn').style.display = 'inline-flex';
            if (currentIdx === questions.length - 1) {
                document.getElementById('next-btn').innerText = 'عرض النتيجة النهائية';
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-footer').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('result-score').innerText = `لقد حصلت على ${score} من أصل ${questions.length}`;
            
            if (score === questions.length) {
                document.getElementById('result-title').innerText = 'عبقري الذكاء الاصطناعي!';
                document.getElementById('result-icon').innerText = '🚀';
            } else if (score >= 3) {
                document.getElementById('result-title').innerText = 'أداء رائع جداً!';
                document.getElementById('result-icon').innerText = '🌟';
            } else {
                document.getElementById('result-icon').innerText = '📚';
                document.getElementById('result-title').innerText = 'بداية جيدة، استمر في التعلم';
            }
        }

        loadQuestion();
    </script>
</body>
</html>
