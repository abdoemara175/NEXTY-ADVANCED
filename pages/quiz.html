<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTY PRO | الاختبار الذكي</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 0.5s ease-in-out; }
        .quiz-option { cursor: pointer; border: 2px solid #e2e8f0; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; transition: var(--transition); display: flex; align-items: center; gap: 1rem; }
        .quiz-option:hover { border-color: var(--secondary); background: #f0f9ff; }
        .quiz-option.selected { border-color: var(--secondary); background: #3b82f6; color: white; }
        .quiz-option.correct { border-color: #10b981; background: #dcfce7; color: #065f46; }
        .quiz-option.wrong { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <nav class="navbar animate-fade">
        <div class="logo">NEXTY PRO</div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="lessons.html">المسارات التعليمية</a></li>
            <li><a href="quiz.html">الاختبارات الذكية</a></li>
        </ul>
        <a href="../index.html" class="btn btn-secondary">إنهاء</a>
    </nav>

    <header class="hero" style="padding: 4rem 5% 2rem;">
        <div class="container">
            <h1 class="animate-fade">الاختبار <span style="color: var(--secondary);">الذكي</span></h1>
            <p class="animate-fade" style="animation-delay: 0.2s;">قياس مستوى المهارات الرقمية المتقدمة</p>
        </div>
    </header>

    <main class="container">
        <div class="quiz-box animate-fade" style="animation-delay: 0.4s;">
            <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
            </div>
            
            <div id="quiz-content">
                <h2 id="question-text" style="margin-bottom: 2rem; font-size: 1.5rem; color: var(--primary);">جاري تحميل الأسئلة...</h2>
                <div id="options-container">
                    <!-- Options injected here -->
                </div>
            </div>

            <div id="quiz-footer" style="margin-top: 3rem; display: flex; justify-content: space-between; align-items: center;">
                <span id="question-counter" style="color: var(--text-muted); font-weight: 600;">السؤال 1 من 5</span>
                <button id="next-btn" class="btn" style="display: none;">السؤال التالي</button>
            </div>

            <div id="result-screen" style="display: none; text-align: center;">
                <div id="result-icon" style="font-size: 5rem; margin-bottom: 1rem;">🏆</div>
                <h2 id="result-title" style="font-size: 2rem; margin-bottom: 1rem;">نتيجة مذهلة!</h2>
                <p id="result-score" style="font-size: 1.5rem; color: var(--secondary); margin-bottom: 2rem;">لقد حصلت على 5/5</p>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button onclick="location.reload()" class="btn">إعادة الاختبار</button>
                    <a href="../index.html" class="btn btn-secondary">العودة للرئيسية</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            { q: "أي مما يلي يعتبر من المكونات المادية (Hardware) للحاسوب؟", options: ["نظام التشغيل Windows", "متصفح Google Chrome", "وحدة المعالجة المركزية CPU", "برنامج Microsoft Word"], correct: 2 },
            { q: "ما هو اختصار لوحة المفاتيح المستخدم لحفظ مستند في برنامج Word؟", options: ["Ctrl + C", "Ctrl + S", "Ctrl + V", "Ctrl + P"], correct: 1 },
            { q: "في برنامج Excel، بماذا تبدأ الصيغة الرياضية دائماً؟", options: ["علامة (+)", "علامة (*)", "علامة (=)", "علامة (#)"], correct: 2 },
            { q: "أي من البرامج التالية يستخدم لإنشاء العروض التقديمية؟", options: ["Excel", "PowerPoint", "Word", "Access"], correct: 1 },
            { q: "ما هي الوظيفة الأساسية لبرنامج Microsoft Excel؟", options: ["كتابة الرسائل", "تصميم الصور", "إدارة الجداول والبيانات الحسابية", "تصفح الإنترنت"], correct: 2 }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `السؤال ${currentIdx + 1} من ${questions.length}`;
            document.getElementById('progress').style.width = `${((currentIdx) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerHTML = `<span>${String.fromCharCode(65 + idx)}</span> <strong>${opt}</strong>`;
                div.onclick = () => selectOption(idx, div);
                container.appendChild(div);
            });
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectOption(idx, element) {
            if (answered) return;
            answered = true;
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.quiz-option');
            
            if (idx === q.correct) {
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('wrong');
                options[q.correct].classList.add('correct');
            }
            
            document.getElementById('next-btn').style.display = 'inline-flex';
            if (currentIdx === questions.length - 1) {
                document.getElementById('next-btn').innerText = 'عرض النتيجة';
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-footer').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('result-score').innerText = `لقد حصلت على ${score} من أصل ${questions.length}`;
            if (score < 3) {
                document.getElementById('result-icon').innerText = '📚';
                document.getElementById('result-title').innerText = 'تحتاج لمزيد من المراجعة';
            }
        }

        loadQuestion();
    </script>
</body>
</html>
