<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTY PRO | تفاصيل المسار</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; }
        .objective-item { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; padding: 1rem; background: #f8fafc; border-radius: 12px; transition: var(--transition); }
        .objective-item:hover { transform: translateX(-5px); background: #f1f5f9; }
        .objective-icon { font-size: 1.5rem; color: var(--secondary); }
    </style>
</head>
<body>
    <nav class="navbar animate-fade">
        <div class="logo">NEXTY PRO</div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="lessons.html">المسارات التعليمية</a></li>
            <li><a href="quiz.html">الاختبارات الذكية</a></li>
        </ul>
        <a href="lessons.html" class="btn btn-secondary">كل المسارات</a>
    </nav>

    <header class="hero" style="padding: 6rem 5% 4rem; background: linear-gradient(135deg, #f8fafc, #e0f2fe);">
        <div class="container">
            <h1 id="lesson-title" class="animate-fade">جاري التحميل...</h1>
            <p id="lesson-subtitle" class="animate-fade" style="animation-delay: 0.2s;"></p>
        </div>
    </header>

    <main class="container">
        <div style="display: grid; grid-template-columns: 1fr 350px; gap: 3rem; margin-top: 4rem; flex-wrap: wrap;">
            <div class="animate-fade" style="animation-delay: 0.4s;">
                <h2 style="color: var(--primary); margin-bottom: 2rem; border-right: 4px solid var(--secondary); padding-right: 1rem;">محتوى المسار التعليمي</h2>
                <div id="lesson-content" style="font-size: 1.15rem; line-height: 2; color: var(--text-main);">
                    <!-- Content loaded via JS -->
                </div>
            </div>

            <aside class="animate-fade" style="animation-delay: 0.6s;">
                <div class="card" style="position: sticky; top: 120px;">
                    <h3 style="margin-bottom: 1.5rem;">أهداف التعلم</h3>
                    <div id="objectives-container">
                        <!-- Objectives loaded via JS -->
                    </div>
                    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #f1f5f9; text-align: center;">
                        <a href="quiz.html" class="btn" style="width: 100%; justify-content: center;">ابدأ الاختبار الآن</a>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer style="margin-top: 8rem; text-align: center; padding: 2rem;">
        <p>&copy; 2026 NEXTY PRO - جميع الحقوق محفوظة</p>
    </footer>

    <script src="../js/lessons-data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id') || "1";

        if (lessonsData[lessonId]) {
            const lesson = lessonsData[lessonId];
            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-subtitle').innerText = lesson.subtitle;
            document.getElementById('lesson-content').innerHTML = lesson.content;
            
            const objectivesHTML = `
                <div class="objective-item">
                    <span class="objective-icon">🧠</span>
                    <div><strong>معرفي:</strong><br>${lesson.objectives.cognitive}</div>
                </div>
                <div class="objective-item">
                    <span class="objective-icon">🛠</span>
                    <div><strong>مهاري:</strong><br>${lesson.objectives.skill}</div>
                </div>
                <div class="objective-item">
                    <span class="objective-icon">💎</span>
                    <div><strong>وجداني:</strong><br>${lesson.objectives.emotional}</div>
                </div>
            `;
            document.getElementById('objectives-container').innerHTML = objectivesHTML;
            document.title = `NEXTY PRO | ${lesson.title}`;
        }
    </script>
</body>
</html>
